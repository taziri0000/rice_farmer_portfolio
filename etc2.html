<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style2.css">
    <title>お問い合わせ - 稲美町１番地農園</title>
</head>

<body class="bgbgbg">
    <header>
        <div class="logo"><a href="index.html">稲美町１番地農園</a></div>
    </header>

    <div class="container">
        <h2>お問い合わせ</h2>
        <form action="#" method="post">
            <p><label>お名前</label><br><input type="text" name="name" style="width:40%; padding:10px;" required></p>
            <p><label>メールアドレス</label><br><input type="email" name="email" style="width:60%; padding:10px;" required></p>
            <p><label>内容</label><br><textarea name="message" rows="5" style="width:70%; padding:10px;"></textarea></p>
            <button type="submit"
                style="padding:10px 30px; background:#5c7a42; color:#fff; border:none; border-radius:5px; cursor:pointer;">送信する</button>
        </form>
    </div>
</body>

</html>
